server {
    listen 80;
    server_name genrefy.armandonetto.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name genrefy.armandonetto.com;

    ssl_certificate     /etc/ssl/cloudflare/hera.armandonetto.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/hera.armandonetto.com.key;

    ssl_client_certificate /etc/ssl/cloudflare/origin_pull_ca.pem;
    ssl_verify_client on;

    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket — necessario para o Streamlit funcionar
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
