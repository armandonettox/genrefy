name: Deploy genrefy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build e reinicia container
        run: |
          cd ~/genrefy
          git pull
          podman build -t genrefy_genrefy:latest .
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
          systemctl --user restart genrefy.service
          sleep 10
          curl -sf http://localhost:8005 > /dev/null && echo "OK"
